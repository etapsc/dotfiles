add_newline = false
format = "$directory$git_branch$git_status$cmd_duration$character"

[directory]
truncation_length = 3
truncate_to_repo = false
format = "[$path]($style) "
style = "bold bright-blue"

[git_branch]
symbol = "git:"
format = "[$symbol$branch]($style) "
style = "bold cyan"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "bold yellow"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "↕↑${ahead_count}↓${behind_count}"
conflicted = "="
deleted = "x"
modified = "!"
renamed = ">"
staged = "+"
stashed = "S"
untracked = "*"

[cmd_duration]
min_time = 3000
format = "[$duration]($style) "
style = "dimmed white"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
vicmd_symbol = "[>](bold yellow)"

[nodejs]
disabled = true

[python]
disabled = true

[golang]
disabled = true

[docker_context]
disabled = true

[kubernetes]
disabled = true
