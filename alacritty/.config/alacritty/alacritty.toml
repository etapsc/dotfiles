[env]
TERM = "xterm-256color"

[window]
option_as_alt = "Both"
padding = { x = 10, y = 8 }
dynamic_padding = true
opacity = 1.0

[font]
size = 12.5

[font.normal]
family = "JetBrainsMono Nerd Font Mono"

[scrolling]
history = 20000
multiplier = 3

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Block", blinking = "Off" }

[[keyboard.bindings]]
key = "Left"
mods = "Alt"
chars = "\u001b[1;3D"

[[keyboard.bindings]]
key = "Right"
mods = "Alt"
chars = "\u001b[1;3C"

[[keyboard.bindings]]
key = "Back"
mods = "Alt"
chars = "\u001b\u007f"

[[keyboard.bindings]]
key = "Back"
mods = "Control"
chars = "\u001b\u007f"

[[keyboard.bindings]]
key = "Back"
mods = "Command"
chars = "\u001b\u007f"

[[keyboard.bindings]]
key = "N"
mods = "Command"
action = "CreateNewWindow"
