[env]
TERM = "xterm-256color"

[window]
padding = { x = 10, y = 8 }
dynamic_padding = true
opacity = 1.0

[font]
size = 12.5

[font.normal]
family = "JetBrainsMono Nerd Font Mono"

[scrolling]
history = 20000
multiplier = 3

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Block", blinking = "Off" }

